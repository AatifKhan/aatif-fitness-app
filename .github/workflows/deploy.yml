name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Install WebP tools
        run: sudo apt-get update -q && sudo apt-get install -y -q webp
      - name: Convert any PNG/JPG/GIF assets to WebP
        run: python3 scripts/convert_images.py
      - name: Regenerate service worker (precache list + content-hash version)
        run: python3 scripts/generate_sw.py
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
